<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arty Dezign | Creative Design & Printing</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Open+Sans&display=swap" rel="stylesheet">

<style>
  * {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Open Sans', sans-serif;
  background: #fff;
  color: #111;
}

h1, h2 {
  font-family: 'Montserrat', sans-serif;
}

/* CONTAINER */
.container {
  width: 100%;
  max-width: 1100px;
  margin: auto;
  padding: 0 15px;
}

/* HEADER */
header {
  background: #fff;
  border-bottom: 1px solid #eee;
  position: sticky;
  top: 0;
}

.nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 0;
}

.logo img {
  height: 70px;
}

.nav a {
  margin-left: 20px;
  color: #555;
  text-decoration: none;
}

/* HERO */
.hero {
  text-align: center;
  padding: 60px 15px;
  background: #f6f6f6;
}

.hero h1 {
  font-size: 2.5rem;
  margin-bottom: 20px;
}

.hero p {
  margin-bottom: 25px;
  color: #555;
}

.btn {
  padding: 12px 25px;
  border-radius: 30px;
  background: #4f5a4f;
  color: #fff;
  font-weight: 700;
  text-decoration: none;
}

/* SECTIONS */
section {
  padding: 60px 0;
}

.section-title {
  text-align: center;
  color: #4f5a4f;
  margin-bottom: 30px;
}

/* GRID */
.grid {
  display: grid;
  gap: 20px;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
}

/* TABS */
.tabs {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  justify-content: center;
  margin-bottom: 20px;
}

.tab {
  padding: 10px 20px;
  border: 1px solid #ddd;
  border-radius: 20px;
  cursor: pointer;
}

.tab.active {
  background: #4f5a4f;
  color: #fff;
}

/* GALLERY */
.gallery {
  display: none;
}

.gallery.active {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 20px;
}

.gallery img {
  width: 100%;
  max-height: 500px;
  object-fit: cover;
  border-radius: 10px;
}

/* IMAGES */
img {
  width: 100%;
  height: auto;
  display: block;
}

/* FORM */
form {
  display: grid;
  gap: 15px;
  max-width: 500px;
  margin: auto;
}

input, textarea {
  padding: 10px;
  border: 1px solid #ddd;
  border-radius: 5px;
}

button {
  padding: 12px;
  background: #4f5a4f;
  color: #fff;
  border: none;
  border-radius: 5px;
}

/* FOOTER */
footer {
  text-align: center;
  padding: 20px;
  color: #555;
}

/* WHATSAPP */
.whatsapp {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #25D366;
  color: #fff;
  padding: 15px;
  border-radius: 50px;
}

/* 🔥 MOBILE FIX */
@media (max-width: 768px) {

  .nav {
    flex-direction: column;
    gap: 10px;
  }

  .nav a {
    margin: 5px 0;
  }

  .logo img {
    height: 50px;
  }

  .hero {
    padding: 40px 15px;
  }

  .hero h1 {
    font-size: 22px;
  }

  .hero p {
    font-size: 14px;
  }

  .btn {
    width: 100%;
  }

  section {
    padding: 40px 10px;
  }

  .tabs {
    flex-direction: column;
    align-items: center;
  }

  .gallery.active {
    grid-template-columns: 1fr;
  }

}

</section>

<script>
function showTab(id){
  document.querySelectorAll('.gallery').forEach(g=>g.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  event.target.classList.add('active');
}
</script>
